<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>CalmBand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --bg-2: #0A0A1A;
        --ink: #F7F4FF;
        --ink-muted: rgba(247, 244, 255, 0.72);
        --ink-dim: rgba(247, 244, 255, 0.56);
        --ink-faint: rgba(247, 244, 255, 0.36);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --surface: rgba(255, 255, 255, 0.04);
        --calm: #5EDC9A;
        --mild: #F5D06F;
        --moderate: #F59E4C;
        --high: #EC5B6B;
        --purple: #B8A4FF;
        --mint: #A8E6CF;
        --coral: #FF8B8B;
      }

      * { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: var(--bg-2);
        color: var(--ink);
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #root { min-height: 100vh; }

      button, input, textarea { font-family: inherit; }

      a { color: inherit; }

      @keyframes heroTextIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes heroShapeIn {
        0% { opacity: 0; transform: translateY(-120px) rotate(0deg) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      }

      @keyframes heroShapeFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(14px); }
      }

      @keyframes sheen {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.7; }
        70% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.7; }
      }

      @keyframes pulse-ring {
        0% { transform: scale(0.7); opacity: 0.9; }
        100% { transform: scale(1.2); opacity: 0; }
      }

      @keyframes spin-slow {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 980px) {
        .nav-links { display: none !important; }
        .auth-left { display: none !important; }
        .auth-left + div {
          width: 100% !important;
          padding: 48px 28px !important;
        }
      }

      @media (max-width: 1100px) {
        .dashboard-sidebar {
          position: static !important;
          width: 100% !important;
          height: auto !important;
          flex-direction: row !important;
          justify-content: space-between !important;
          padding: 16px 18px !important;
          border-right: none !important;
          border-bottom: 1px solid var(--border) !important;
          background: rgba(10,10,26,0.75) !important;
        }

        .dashboard-sidebar > div:nth-child(2) {
          flex: 1 !important;
          flex-direction: row !important;
          justify-content: center !important;
          gap: 8px !important;
        }

        .dashboard-main {
          margin-left: 0 !important;
          padding: 24px 22px 80px !important;
        }

        .dashboard-row {
          grid-template-columns: 1fr !important;
        }
      }

      @media (max-width: 720px) {
        .dashboard-stats {
          grid-template-columns: repeat(2, 1fr) !important;
        }
      }

      @media (max-width: 520px) {
        .dashboard-stats {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS v2 — conexión a base de datos -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script type="text/babel" data-presets="env,react" src="src/icons.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/primitives.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/bracelet.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/hero.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/supabase-client.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/landing.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/auth.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/pairing.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/dashboard.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/kids.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="src/app.jsx"></script>
  </body>
</html>
